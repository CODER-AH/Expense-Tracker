name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'backend/Code.js'
      - 'backend/appsscript.json'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Create clasp credentials
        run: |
          mkdir -p ~/.config/@google
          echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json
          echo "Credentials file created"
          echo "File size: $(wc -c < ~/.clasprc.json)"

      - name: Verify .clasp.json exists
        run: |
          if [ ! -f .clasp.json ]; then
            echo "Error: .clasp.json not found!"
            exit 1
          fi
          echo ".clasp.json found"
          cat .clasp.json

      - name: Deploy to Apps Script
        run: clasp push

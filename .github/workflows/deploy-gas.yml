name: Deploy to Google Apps Script

on:
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI
  push:
    branches:
      - main
    paths:
      - 'backend/Code.js'
      - 'backend/appsscript.json'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Create clasp credentials
        run: |
          mkdir -p ~/.config/@google
          # Create temporary file with the credentials
          cat > /tmp/creds.json << 'CLASPRC'
          ${{ secrets.CLASP_CREDENTIALS }}
          CLASPRC

          # Transform from nested tokens.default structure to flat structure clasp expects
          echo "Transforming credentials format..."
          jq '{
            token: {
              access_token: .tokens.default.access_token,
              refresh_token: .tokens.default.refresh_token,
              token_type: .tokens.default.token_type,
              expiry_date: .tokens.default.expiry_date
            }
          }' /tmp/creds.json > ~/.clasprc.json

          echo "Credentials file created"
          echo "Structure (tokens hidden):"
          jq 'del(.token.access_token, .token.refresh_token)' ~/.clasprc.json
          rm /tmp/creds.json

      - name: Verify .clasp.json exists
        run: |
          if [ ! -f .clasp.json ]; then
            echo "Error: .clasp.json not found!"
            exit 1
          fi
          echo ".clasp.json found"
          cat .clasp.json

      - name: Deploy to Apps Script
        run: clasp push
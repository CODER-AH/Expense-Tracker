name: Deploy to Google Apps Script

on:
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI
  push:
    branches:
      - main
    paths:
      - 'backend/Code.js'
      - 'backend/appsscript.json'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Create clasp credentials
        run: |
          mkdir -p ~/.config/@google
          # Create .clasprc.json with correct format for newer clasp
          cat > ~/.clasprc.json << 'CLASPRC'
          ${{ secrets.CLASP_CREDENTIALS }}
          CLASPRC
          echo "Credentials file created"
          echo "Checking file structure..."
          # Validate JSON structure
          if ! jq empty ~/.clasprc.json 2>/dev/null; then
            echo "Warning: Invalid JSON format"
          fi

      - name: Verify .clasp.json exists
        run: |
          if [ ! -f .clasp.json ]; then
            echo "Error: .clasp.json not found!"
            exit 1
          fi
          echo ".clasp.json found"
          cat .clasp.json

      - name: Deploy to Apps Script
        run: clasp push
